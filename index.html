<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111214">
    <title>Панель CostIQ</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">CostIQ Mini App</p>
          <h1>Панель КостиКа</h1>
        </div>
        <div class="status" id="tg-status">Telegram</div>
      </header>

      <section class="quick">
        <button class="primary-action" type="button" data-action="check_kp">
          <span class="action-icon">▣</span>
          <span>
            <strong>Проверить КП</strong>
            <small>Excel подрядчика, отклонения, вывод САУ</small>
          </span>
        </button>
        <button class="primary-action secondary" type="button" data-action="calc_ps">
          <span class="action-icon">∑</span>
          <span>
            <strong>Рассчитать ПС</strong>
            <small>ВОР, расценки, основания, итоговый Excel</small>
          </span>
        </button>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>Навыки</h2>
          <span id="user-label">Готово к запуску</span>
        </div>
        <div class="grid" id="skill-grid"></div>
      </section>

      <section class="section compact">
        <div class="section-head">
          <h2>Рабочий контур</h2>
          <span>SAUFSK</span>
        </div>
        <div class="ops">
          <button type="button" data-action="task_status">Статус задачи</button>
          <button type="button" data-action="help">Помощь</button>
          <button type="button" data-action="menu">Обычное меню</button>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
